<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonZone - Modern Elegance</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #09090b;
            --surface: #18181b;
            --surface-accent: #27272a;
            --primary: #ffffff;
            --accent: #3b82f6; /* Biru elegan */
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.5;
        }

        /* --- Header --- */
        header {
            height: 55px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--primary);
        }
        .logo-text span { color: var(--accent); }

        /* --- Banner & Tags --- */
        .banner-container { width: 100%; padding: 20px; }
        .slider {
            display: flex; overflow-x: auto;
            scroll-snap-type: x mandatory; border-radius: 16px;
        }
        .slider::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; aspect-ratio: 21 / 9; scroll-snap-align: start; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .filter-tags { display: flex; gap: 8px; padding: 10px 20px; overflow-x: auto; }
        .filter-tags::-webkit-scrollbar { display: none; }
        .tag-btn {
            padding: 8px 20px; background: var(--surface);
            border: 1px solid var(--glass-border); color: var(--text-muted);
            border-radius: 100px; font-size: 0.85rem; white-space: nowrap;
            transition: 0.3s;
        }
        .tag-btn.active {
            background: var(--primary); color: var(--bg-dark); border-color: var(--primary);
        }

        .section-title {
            font-size: 1.1rem; font-weight: 700; margin: 30px 20px 15px;
            color: var(--text-main);
        }

        /* ==========================================
           MODERN & ELEGANT CARD REDESIGN
           ========================================== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 20px 40px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
        }

        /* Image Container */
        .card-img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            overflow: hidden;
            background: var(--surface);
            margin-bottom: 12px;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* Badge Minimalist */
        .card-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 2;
            text-transform: uppercase;
        }

        /* Info Section */
        .card-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-category {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: block;
        }

        .price-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Action Button */
        .btn-buy {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--surface-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: 0.3s;
        }

        /* Hover Interaction */
        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card:hover .card-img-wrapper img {
            transform: scale(1.1);
        }

        .card:hover .btn-buy {
            background: var(--primary);
            color: var(--bg-dark);
        }

        /* PPOB Icon Style */
        .icon-mode {
            padding: 20%;
            object-fit: contain !important;
            filter: grayscale(0.2);
        }

        /* Hamburger Simple */
        .burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .burger span { width: 20px; height: 2px; background: var(--text-main); border-radius: 2px; }

    </style>
</head>
<body>

    <header>
        <div class="logo-text">NEON<span>ZONE</span></div>
        <div class="burger">
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        <section class="banner-container">
            <div class="slider" id="slider">
                <div class="slide"><img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=800&auto=format&fit=crop" alt="Banner 1"></div>
            </div>
        </section>

        <section class="filter-tags">
            <button class="tag-btn active">Semua</button>
            <button class="tag-btn">Game Topup</button>
            <button class="tag-btn">Digital Billing</button>
            <button class="tag-btn">Entertainment</button>
        </section>

        <h2 class="section-title">Layanan Terpopuler</h2>
        <section class="product-grid">
            
            <a href="#" class="card">
                <div class="card-img-wrapper">
                    <span class="card-badge">Terlaris</span>
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400" alt="MLBB">
                </div>
                <div class="card-body">
                    <span class="card-category">Mobile Game</span>
                    <h3 class="card-title">Mobile Legends</h3>
                    <div class="card-footer">
                        <div>
                            <span class="price-label">Mulai dari</span>
                            <span class="price-value">Rp 1.500</span>
                        </div>
                        <div class="btn-buy">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </div>
                    </div>
                </div>
            </a>

            <a href="#" class="card">
                <div class="card-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=400" alt="Valorant">
                </div>
                <div class="card-body">
                    <span class="card-category">PC Game</span>
                    <h3 class="card-title">Valorant Points</h3>
                    <div class="card-footer">
                        <div>
                            <span class="price-label">Mulai dari</span>
                            <span class="price-value">Rp 15.000</span>
                        </div>
                        <div class="btn-buy">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </div>
                    </div>
                </div>
            </a>

            <a href="#" class="card">
                <div class="card-img-wrapper">
                    <img class="icon-mode" src="https://cdn-icons-png.flaticon.com/512/3014/3014498.png" alt="Telkomsel">
                </div>
                <div class="card-body">
                    <span class="card-category">Provider</span>
                    <h3 class="card-title">Telkomsel Data</h3>
                    <div class="card-footer">
                        <div>
                            <span class="price-label">Proses Cepat</span>
                            <span class="price-value">Instan 24 Jam</span>
                        </div>
                        <div class="btn-buy">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </div>
                    </div>
                </div>
            </a>

            <a href="#" class="card">
                <div class="card-img-wrapper">
                    <span class="card-badge" style="background: #ef4444; color: white;">Promo</span>
                    <img class="icon-mode" src="https://cdn-icons-png.flaticon.com/512/2907/2907972.png" alt="Indosat">
                </div>
                <div class="card-body">
                    <span class="card-category">Provider</span>
                    <h3 class="card-title">Indosat Ooredoo</h3>
                    <div class="card-footer">
                        <div>
                            <span class="price-label">Promo Spesial</span>
                            <span class="price-value">Diskon 10%</span>
                        </div>
                        <div class="btn-buy">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </div>
                    </div>
                </div>
            </a>

        </section>
    </main>

    <script>
        // Simple Tag Toggle
        const tags = document.querySelectorAll('.tag-btn');
        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
            });
        });
    </script>
</body>
</html>
